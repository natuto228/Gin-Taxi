<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кабинет водителя - Gin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/southghetto">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .driver-stats {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            margin-bottom: 15px;
        }
        .order-item {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">Gin</a>
        <a href="/" class="btn btn-outline-light btn-sm" id="logoutBtn">Выйти</a>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-md-4">
            <div class="driver-stats">
                <div class="logo-circle" style="width: 50px; height: 50px; font-size: 24px; margin: 0 auto 10px;">D</div>
                <h4 style="font-size: 14px;">Водитель</h4>
                <button id="statusBtn" class="btn btn-success w-100 mb-3" style="background: #28a745;">Онлайн</button>
                <hr>
                <h3 id="earnings" style="font-size: 18px;">0 ₽</h3>
                <p style="font-size: 11px; color: #666;">Заработано сегодня</p>
            </div>
        </div>
        
        <div class="col-md-8">
            <div class="driver-stats">
                <h5 style="font-size: 14px; margin-bottom: 15px;">Новые заказы</h5>
                <div id="ordersList">
                    <div class="alert alert-info" style="font-size: 11px;">Загрузка...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
