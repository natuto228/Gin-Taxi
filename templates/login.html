<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ВХОД ВОДИТЕЛЯ - GIN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/southghetto">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-body">

<a href="/" class="header-back">← НА ГЛАВНУЮ</a>

<div class="login-card">
    <div class="text-center">
        <div class="logo-circle">D</div>
        <h3>ВХОД ВОДИТЕЛЯ</h3>
    </div>
    
    <form id="driverLoginForm">
        <label>ЛОГИН</label>
        <input type="text" id="driverLogin" required>
        
        <label>ПАРОЛЬ</label>
        <input type="password" id="driverPassword" required>
        
        <button type="submit" class="btn-login">ВОЙТИ</button>
    </form>
    
    <div style="text-align: center; margin-top: 15px;">
        <span style="color: #999; font-size: 10px;">ТЕСТ: DRIVER / 12345</span>
    </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
