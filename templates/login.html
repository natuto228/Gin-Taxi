<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход водителя - Gin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/southghetto">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-body">

<a href="/" class="header-back">← На главную</a>

<div class="login-card">
    <div class="text-center">
        <div class="logo-circle">D</div>
        <h3>Вход водителя</h3>
    </div>
    
    <form id="driverLoginForm">
        <label>Логин</label>
        <input type="text" id="driverLogin" required>
        
        <label>Пароль</label>
        <input type="password" id="driverPassword" required>
        
        <button type="submit" class="btn-login">Войти</button>
    </form>
    
    <div style="text-align: center; margin-top: 15px;">
        <span style="color: #999; font-size: 10px;">Тест: driver / 12345</span>
    </div>
</div>

<script>
    document.getElementById('driverLoginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const login = document.getElementById('driverLogin').value;
        const password = document.getElementById('driverPassword').value;
        
        if (login === 'driver' && password === '12345') {
            localStorage.setItem('driverLoggedIn', 'true');
            window.location.href = '/driver-dashboard';
        } else {
            alert('Неверный логин или пароль');
        }
    });
</script>

</body>
</html>
