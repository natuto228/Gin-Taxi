<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход водителя - Gin Taxi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-body">

<a href="/" class="header-back">На главную</a>

<div class="login-card">
    <div class="text-center">
        <div class="logo-circle">D</div>
        <h3>Вход водителя</h3>
        <p>Gin Taxi</p>
    </div>
    
    <form id="driverLoginForm">
        <div class="mb-3">
            <label class="form-label">Логин</label>
            <input type="text" class="form-control" id="driverLogin" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Пароль</label>
            <input type="password" class="form-control" id="driverPassword" required>
        </div>
        <button type="submit" class="btn-login w-100">Войти</button>
    </form>
    
    <div class="text-center mt-2">
        <small class="text-muted">Тест: driver / 12345</small>
    </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
