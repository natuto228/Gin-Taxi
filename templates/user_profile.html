<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>МОЙ ПРОФИЛЬ - GIN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/southghetto">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .order-card {
            background: #f8f9fa;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 3px solid #87CEFA;
        }
        .order-card div {
            font-size: 11px;
            color: #333;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/" style="color: white;">GIN</a>
        <div>
            <span class="text-white me-3" id="userNameDisplay"></span>
            <a href="/" class="btn btn-outline-light btn-sm" onclick="localStorage.clear()">ВЫЙТИ</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row">
        <div class="col-md-4">
            <div class="card text-center" style="border: none; box-shadow: none;">
                <div class="card-body">
                    <i class="fas fa-user-circle fa-4x mb-3" style="color: #87CEFA;"></i>
                    <h4 id="userFullname" style="font-size: 14px;"></h4>
                    <p class="text-muted" style="font-size: 11px;">ПОЛЬЗОВАТЕЛЬ GIN</p>
                    <hr>
                    <a href="/" class="btn btn-primary w-100" style="background: #87CEFA; border: none; color: white;">ЗАКАЗАТЬ ТАКСИ</a>
                </div>
            </div>
        </div>
        
        <div class="col-md-8">
            <div class="card" style="border: none; box-shadow: none;">
                <div class="card-header bg-white" style="border-bottom: 1px solid #eee;">
                    <h5 style="font-size: 14px;">ИСТОРИЯ МОИХ ЗАКАЗОВ</h5>
                </div>
                <div class="card-body" id="ordersHistory">
                    <div class="alert alert-info" style="font-size: 11px;">ЗАГРУЗКА...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
