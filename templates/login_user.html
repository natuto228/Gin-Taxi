<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Gin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/southghetto">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-body">

<a href="/" class="header-back">← На главную</a>

<div class="login-card">
    <div class="text-center">
        <div class="logo-circle">G</div>
        <h3>Вход пользователя</h3>
    </div>
    
    <form id="loginUserForm">
        <label>Email</label>
        <input type="email" id="email" required>
        
        <label>Пароль</label>
        <input type="password" id="password" required>
        
        <button type="submit" class="btn-login">Войти</button>
    </form>
    
    <div style="text-align: center; margin-top: 15px;">
        <a href="/register" style="color: #999; font-size: 11px;">Нет аккаунта? Зарегистрироваться</a>
    </div>
</div>

<script>
    document.getElementById('loginUserForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        const formData = new FormData();
        formData.append('email', email);
        formData.append('password', password);
        
        try {
            const response = await fetch('/login-user', {
                method: 'POST',
                body: formData
            });
            
            const result = await response.json();
            
            if (result.success) {
                localStorage.setItem('userId', result.user_id);
                localStorage.setItem('userName', result.fullname);
                localStorage.setItem('userPhone', result.phone);
                localStorage.setItem('userEmail', result.email);
                alert('Добро пожаловать, ' + result.fullname + '!');
                window.location.href = '/user-profile';
            } else {
                alert(result.error || 'Неверный email или пароль');
            }
        } catch (error) {
            alert('Ошибка соединения. Попробуйте ещё раз.');
        }
    });
</script>

</body>
</html>
