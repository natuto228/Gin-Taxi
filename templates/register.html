<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Gin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/southghetto">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-body">

<a href="/" class="header-back">← На главную</a>

<div class="login-card">
    <div class="text-center">
        <div class="logo-circle">G</div>
        <h3>Регистрация</h3>
    </div>
    
    <form id="registerForm">
        <label>ФИО</label>
        <input type="text" id="fullname" required>
        
        <label>Телефон</label>
        <input type="tel" id="phone" required>
        
        <label>Email</label>
        <input type="email" id="email" required>
        
        <label>Пароль</label>
        <input type="password" id="password" required>
        
        <button type="submit" class="btn-login">Зарегистрироваться</button>
    </form>
    
    <div style="text-align: center; margin-top: 15px;">
        <a href="/login-user" style="color: #999; font-size: 11px;">Уже есть аккаунт? Войти</a>
    </div>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const fullname = document.getElementById('fullname').value;
        const phone = document.getElementById('phone').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        const formData = new FormData();
        formData.append('fullname', fullname);
        formData.append('phone', phone);
        formData.append('email', email);
        formData.append('password', password);
        
        try {
            const response = await fetch('/register', {
                method: 'POST',
                body: formData
            });
            
            if (response.redirected) {
                alert('Регистрация успешна! Теперь войдите в аккаунт.');
                window.location.href = '/login-user';
            } else {
                const result = await response.json();
                if (result.error) {
                    alert(result.error);
                } else {
                    alert('Ошибка регистрации. Попробуйте ещё раз.');
                }
            }
        } catch (error) {
            alert('Ошибка соединения. Попробуйте ещё раз.');
        }
    });
</script>

</body>
</html>
