<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>РЕГИСТРАЦИЯ - GIN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/southghetto">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-body">

<a href="/" class="header-back">← НА ГЛАВНУЮ</a>

<div class="login-card">
    <div class="text-center">
        <div class="logo-circle">G</div>
        <h3>РЕГИСТРАЦИЯ</h3>
    </div>
    
    <form id="registerForm">
        <label>ФИО</label>
        <input type="text" id="fullname" required>
        
        <label>ТЕЛЕФОН</label>
        <input type="tel" id="phone" required>
        
        <label>EMAIL</label>
        <input type="email" id="email" required>
        
        <label>ПАРОЛЬ</label>
        <input type="password" id="password" required>
        
        <button type="submit" class="btn-login">ЗАРЕГИСТРИРОВАТЬСЯ</button>
    </form>
    
    <div style="text-align: center; margin-top: 15px;">
        <a href="/login-user" style="color: black; font-size: 11px;">УЖЕ ЕСТЬ АККАУНТ? ВОЙТИ</a>
    </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
