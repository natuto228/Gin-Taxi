<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIN - Заказ такси</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="page-container">
    
    <header class="header">
        <div class="user-status">
            <i class="fas fa-user-circle"></i>
            <span id="userNameHeader">
                <a href="/login-user" style="color:#666;">Войти</a>
            </span>
        </div>
    </header>
    
    <div class="main-content">
        
        <aside class="sidebar">
            
            <div class="logo-block">
                <h1>GIN</h1>
            </div>
            
            <!-- КНОПКА 1: ЗАКАЗ ПО ТЕЛЕФОНУ -->
            <div class="action-card" onclick="makePhoneCall()">
                <h3>заказ по телефону</h3>
                <p> +7 (812) 123-45-67</p>
            </div>
            
            <!-- КНОПКА 2: ВЫБРАТЬ ТАРИФ (ОТКРЫВАЕТ ФОРМУ) -->
            <div class="action-card" onclick="openOrderForm()">
                <h3>выбрать тариф</h3>
                <p> заказать такси</p>
            </div>
            
            <!-- КНОПКА 3: КОММЕНТАРИЙ ВОДИТЕЛЮ -->
            <div class="action-card" onclick="openCommentModal()">
                <h3>комментарий водителю</h3>
                <p> добавить пожелания</p>
            </div>
            
            <div class="driver-login-block" onclick="window.location.href='/login'">
                <h3>войти в профиль</h3>
                <p>работа в такси</p>
            </div>
            
        </aside>
        
        <!-- ПРАВАЯ КОЛОНКА - КАРТА -->
        <div class="map-container">
            <div id="map"></div>
        </div>
    </div>
    
    <footer class="footer">
        <p>GIN | Заказ такси 24/7</p>
    </footer>
</div>

<!-- МОДАЛЬНОЕ ОКНО ДЛЯ ФОРМЫ ЗАКАЗА (ВЫЗОВ ТАКСИ) -->
<div id="orderModal" class="modal-custom">
    <div class="modal-content" style="width: 450px;">
        <h3> ЗАКАЗ ТАКСИ</h3>
        <hr>
        
        <label class="form-label">ФИО</label>
        <input type="text" id="orderName" class="form-control mb-2" placeholder="Введите ваше имя">
        
        <label class="form-label">Телефон</label>
        <input type="tel" id="orderPhone" class="form-control mb-2" placeholder="+7 XXX XXX-XX-XX">
        
        <label class="form-label">Адрес подачи</label>
        <input type="text" id="orderPickup" class="form-control mb-2" placeholder="Откуда едем?">
        
        <label class="form-label">Адрес назначения</label>
        <input type="text" id="orderDropoff" class="form-control mb-2" placeholder="Куда едем?">
        
        <label class="form-label">Тариф</label>
        <select id="orderTariff" class="form-control mb-3">
            <option value="Эконом (25 ₽/км)"> Эконом — 25 ₽/км</option>
            <option value="Комфорт (35 ₽/км)"> Комфорт — 35 ₽/км</option>
            <option value="Бизнес (50 ₽/км)"> Бизнес — 50 ₽/км</option>
        </select>
        
        <button class="btn btn-primary w-100" onclick="submitOrder()">ЗАКАЗАТЬ ТАКСИ</button>
        <button class="btn btn-secondary w-100 mt-2" onclick="closeOrderModal()">Отмена</button>
    </div>
</div>

<!-- МОДАЛЬНОЕ ОКНО КОММЕНТАРИЯ -->
<div id="commentModal" class="modal-custom">
    <div class="modal-content">
        <h3> Комментарий водителю</h3>
        <textarea id="driverComment" class="form-control mt-3" rows="4" placeholder="Ваши пожелания..."></textarea>
        <button class="btn btn-primary w-100 mt-3" onclick="sendComment()">Отправить</button>
        <button class="btn btn-secondary w-100 mt-2" onclick="closeCommentModal()">Отмена</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/static/script.js"></script>

</body>
</html>
