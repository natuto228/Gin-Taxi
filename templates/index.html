<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIN - Заказ такси</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="page-container">
    
    <header class="header">
        <div class="user-status">
            <i class="fas fa-user-circle"></i>
            <span id="userNameHeader">
                <a href="/login-user">Войти</a>
            </span>
        </div>
    </header>
    
    <div class="main-content">
        
        <aside class="sidebar">
            
            <!-- КАРТОЧКА 1: ЛОГОТИП -->
            <div class="logo-image-card" onclick="window.location.href='/'">
                <img src="https://i.imgur.com/placeholder.jpg" alt="GIN Logo">
                <p>GIN TAXI</p>
            </div>
            
            <!-- КАРТОЧКА 2: ЗАКАЗ ПО ТЕЛЕФОНУ -->
            <div class="action-card" onclick="makePhoneCall()">
                <h3>заказ по телефону</h3>
                <p>+7 (812) 123-45-67</p>
            </div>
            
            <!-- КАРТОЧКА 3: ВЫБРАТЬ ТАРИФ -->
            <div class="action-card" onclick="openOrderForm()">
                <h3>выбрать тариф</h3>
                <p>заказать такси</p>
            </div>
            
            <!-- КАРТОЧКА 4: КОММЕНТАРИЙ ВОДИТЕЛЮ -->
            <div class="action-card" onclick="openCommentModal()">
                <h3>комментарий водителю</h3>
                <p>добавить пожелания</p>
            </div>
            
            <!-- КАРТОЧКА 5: ВОЙТИ В ПРОФИЛЬ -->
            <div class="action-card" onclick="window.location.href='/login'">
                <h3>войти в профиль</h3>
                <p>работа в такси</p>
            </div>
            
        </aside>
        
        <div class="map-container">
            <div class="search-overlay">
                <input type="text" id="addressSearch" placeholder="Поиск адреса...">
                <button onclick="searchAddress()">Найти</button>
            </div>
            <div id="map"></div>
        </div>
    </div>
    
    <footer class="footer">
        <p>GIN | Заказ такси 24/7</p>
    </footer>
</div>

<!-- МОДАЛЬНОЕ ОКНО ФОРМЫ ЗАКАЗА -->
<div id="orderModal" class="modal-custom">
    <div class="modal-content">
        <h3>ЗАКАЗ ТАКСИ</h3>
        <hr>
        <input type="text" id="orderName" class="form-control mb-2" placeholder="ФИО">
        <input type="tel" id="orderPhone" class="form-control mb-2" placeholder="Телефон">
        <input type="text" id="orderPickup" class="form-control mb-2" placeholder="Адрес подачи">
        <input type="text" id="orderDropoff" class="form-control mb-2" placeholder="Адрес назначения">
        <select id="orderTariff" class="form-control mb-3">
            <option value="Эконом (25 руб/км)">Эконом - 25 руб/км</option>
            <option value="Комфорт (35 руб/км)">Комфорт - 35 руб/км</option>
            <option value="Бизнес (50 руб/км)">Бизнес - 50 руб/км</option>
        </select>
        <button class="btn btn-primary w-100" onclick="submitOrder()">ЗАКАЗАТЬ ТАКСИ</button>
        <button class="btn btn-secondary w-100 mt-2" onclick="closeOrderModal()">Отмена</button>
    </div>
</div>

<!-- МОДАЛЬНОЕ ОКНО КОММЕНТАРИЯ -->
<div id="commentModal" class="modal-custom">
    <div class="modal-content">
        <h3>Комментарий водителю</h3>
        <textarea id="driverComment" class="form-control mt-3" rows="4" placeholder="Ваши пожелания..."></textarea>
        <button class="btn btn-primary w-100 mt-3" onclick="sendComment()">Отправить</button>
        <button class="btn btn-secondary w-100 mt-2" onclick="closeCommentModal()">Отмена</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/static/script.js"></script>

</body>
</html>
