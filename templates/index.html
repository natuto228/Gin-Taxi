<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIN - ЗАКАЗ ТАКСИ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/southghetto">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="page-container">
    
    <header class="header">
        <div class="user-status">
            <i class="fas fa-user-circle"></i>
            <span id="userNameHeader">
                <a href="/login-user">ВОЙТИ</a>
            </span>
        </div>
    </header>
    
    <div class="main-content">
        
        <aside class="sidebar">
            
            <div class="logo-image-card" onclick="window.location.href='/'">
                <img src="/static/gin_photo.jpg" alt="GIN" id="logoImage">
                <p>GIN TAXI</p>
            </div>
            
            <div class="action-card" onclick="makePhoneCall()">
                <h3>ЗАКАЗ ПО ТЕЛЕФОНУ</h3>
            </div>
            
            <div class="action-card" onclick="openOrderForm()">
                <h3>ВЫБРАТЬ ТАРИФ</h3>
            </div>
            
            <div class="action-card" onclick="openCommentModal()">
                <h3>КОММЕНТАРИЙ ВОДИТЕЛЮ</h3>
            </div>
            
            <div class="driver-card" onclick="window.location.href='/login'">
                <h3>ВОЙТИ В ПРОФИЛЬ</h3>
                <p>РАБОТА В ТАКСИ</p>
            </div>
            
        </aside>
        
        <div class="map-container">
            <div class="search-overlay">
                <input type="text" id="addressSearch" placeholder="ПОИСК АДРЕСА">
                <button onclick="searchAddress()">НАЙТИ</button>
            </div>
            <div id="map"></div>
        </div>
    </div>
    
    <footer class="footer">
        <div class="footer-content">
            <span>ИБРАГИМОВА Ф.Н.</span>
            <span>УЧЕБНЫЙ ПРОЕКТ</span>
            <span>GIN TAXI 2026</span>
        </div>
    </footer>
</div>

<div id="orderModal" class="modal-custom">
    <div class="modal-content">
        <h3>ЗАКАЗ ТАКСИ</h3>
        <hr>
        <input type="text" id="orderName" placeholder="ФИО">
        <input type="tel" id="orderPhone" placeholder="ТЕЛЕФОН">
        <input type="text" id="orderPickup" placeholder="АДРЕС ПОДАЧИ">
        <input type="text" id="orderDropoff" placeholder="АДРЕС НАЗНАЧЕНИЯ">
        <select id="orderTariff">
            <option value="Эконом (25 руб/км)">ЭКОНОМ - 25 РУБ/КМ</option>
            <option value="Комфорт (35 руб/км)">КОМФОРТ - 35 РУБ/КМ</option>
            <option value="Бизнес (50 руб/км)">БИЗНЕС - 50 РУБ/КМ</option>
        </select>
        <button class="btn-primary" onclick="submitOrder()">ЗАКАЗАТЬ ТАКСИ</button>
        <button class="btn-secondary" onclick="closeOrderModal()">ОТМЕНА</button>
    </div>
</div>

<div id="commentModal" class="modal-custom">
    <div class="modal-content">
        <h3>КОММЕНТАРИЙ ВОДИТЕЛЮ</h3>
        <textarea id="driverComment" rows="4" placeholder="ВАШИ ПОЖЕЛАНИЯ..."></textarea>
        <button class="btn-primary" onclick="sendComment()">ОТПРАВИТЬ</button>
        <button class="btn-secondary" onclick="closeCommentModal()">ОТМЕНА</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/static/script.js"></script>

</body>
</html>
