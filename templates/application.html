<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АНКЕТА - GIN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/southghetto">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-body">

<div class="login-card">
    <div class="text-center">
        <div class="logo-circle">A</div>
        <h3>АНКЕТА ДЛЯ СВЯЗИ</h3>
    </div>
    
    <form id="applicationForm">
        <label>ФИО</label>
        <input type="text" id="appFullname" required>
        
        <label>ТЕЛЕФОН</label>
        <input type="tel" id="appPhone" required>
        
        <label>EMAIL</label>
        <input type="email" id="appEmail" required>
        
        <label>РОЛЬ</label>
        <select id="appRole">
            <option value="driver">ВОДИТЕЛЬ ТАКСИ</option>
            <option value="passenger">ПАССАЖИР</option>
        </select>
        
        <button type="submit" class="btn-login">ОТПРАВИТЬ</button>
    </form>
    
    <div style="text-align: center; margin-top: 15px;">
        <a href="/login" style="color: black; font-size: 11px;">ВЕРНУТЬСЯ КО ВХОДУ</a>
    </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
